<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root{
    --teal:#2A5A52; --teal-deep:#234B45; --teal-900:#18332F;
    --turq:#3FA68F; --turq-700:#25685A;
    --cream:#FAF6F1; --cream-2:#F1EAE0; --surface:#FFFCF6;
    --line:#E2DCD0; --ink:#1F2A28; --ink-2:#46544F; --ink-3:#7C8983;
    --font:'Hanken Grotesk',-apple-system,system-ui,sans-serif;
  }
  html,body{ width:1280px; height:640px; }
  body{ font-family:var(--font); background:var(--cream); color:var(--ink);
    position:relative; overflow:hidden; }
  /* warm corner glow */
  .glow{ position:absolute; width:720px; height:720px; right:-160px; top:-220px;
    background:radial-gradient(circle, rgba(63,166,143,.18), rgba(63,166,143,0) 62%); }
  .wrap{ position:absolute; inset:0; padding:72px 80px; display:flex; flex-direction:column; }
  .eyebrow{ display:flex; align-items:center; gap:14px; font:800 19px/1 var(--font);
    letter-spacing:.16em; text-transform:uppercase; color:var(--turq-700); }
  .eyebrow .rule{ width:48px; height:3px; border-radius:2px; background:var(--turq); }
  h1{ font:800 132px/.92 var(--font); letter-spacing:-.03em; margin-top:30px; color:var(--ink); }
  h1 .mono{ font-family:var(--font); }
  .sub{ font:500 33px/1.32 var(--font); color:var(--ink-2); margin-top:24px; max-width:21ch; }
  .sub em{ font-style:normal; color:var(--turq-700); font-weight:700; }
  .pills{ display:flex; gap:14px; margin-top:auto; flex-wrap:wrap; }
  .pill{ display:flex; align-items:center; gap:10px; background:var(--surface);
    border:1.5px solid var(--line); border-radius:999px; padding:13px 22px;
    font:700 21px/1 var(--font); color:var(--ink); }
  .pill svg{ color:var(--turq-700); }
  .foot{ margin-top:30px; display:flex; align-items:center; gap:12px;
    font:700 23px/1 var(--font); color:var(--ink-3); }
  .foot svg{ color:var(--ink-3); }
  /* deck motif, top-right */
  .motif{ position:absolute; right:80px; top:96px; width:300px; height:300px; }
  .slidecard{ position:absolute; border-radius:18px; background:var(--surface);
    border:2px solid var(--line); box-shadow:0 18px 44px rgba(35,75,69,.16); }
  .s1{ inset:0 40px 70px 0; transform:rotate(-7deg); }
  .s2{ inset:30px 10px 38px 30px; transform:rotate(4deg); background:var(--teal-deep); border-color:var(--teal-900); }
  .s2 .bar{ position:absolute; border-radius:6px; background:rgba(255,255,255,.16); }
  .s2 .accent{ background:var(--turq); }
</style>
</head>
<body>
  <div class="glow"></div>

  <div class="motif">
    <div class="slidecard s1"></div>
    <div class="slidecard s2">
      <span class="bar accent" style="left:26px; top:30px; width:120px; height:14px;"></span>
      <span class="bar" style="left:26px; top:58px; width:190px; height:10px;"></span>
      <span class="bar" style="left:26px; top:76px; width:160px; height:10px;"></span>
      <span class="bar" style="left:26px; bottom:30px; width:90px; height:30px; border-radius:8px;"></span>
      <span class="bar accent" style="left:128px; bottom:30px; width:90px; height:30px; border-radius:8px;"></span>
    </div>
  </div>

  <div class="wrap">
    <div class="eyebrow"><span class="rule"></span>A Claude Code skill</div>
    <h1>html-deck</h1>
    <p class="sub">Executive-grade HTML slide decks, <em>re-skinnable</em> to any brand.</p>

    <div class="pills">
      <span class="pill"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="M7 16h10"/></svg>Keyboard-driven</span>
      <span class="pill"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>Print-ready</span>
      <span class="pill"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg>No build step</span>
      <span class="pill"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Deploy behind a password</span>
    </div>

    <div class="foot">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.2.8-.5v-1.7c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 .8 2.6.6 3.3.4.1-.7.4-1.2.7-1.5-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17.3 4.7 18.3 5 18.3 5c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.6.8.5 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg>
      github.com/cla1redonald/claude-html-deck
    </div>
  </div>
</body>
</html>
